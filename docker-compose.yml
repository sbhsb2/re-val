version: '3.8'

services:
  valhalla:
    image: ghcr.io/valhalla/valhalla:latest
    container_name: valhalla-service
    ports:
      - "8002:8002"
    volumes:
      - ./data:/data
      - ./tiles:/tiles
      - ./config:/config
    command: valhalla_service /config/valhalla.json 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: valhalla-network