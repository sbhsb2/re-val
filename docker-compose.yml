version: '3.8'

services:
  valhalla:
    image: valhalla/valhalla:latest
    container_name: valhalla-service
    ports:
      - "8002:8002"
    volumes:
      - ./valhalla_tiles:/custom_files
    environment:
      - tile_urls=https://download.geofabrik.de/europe/germany/bremen-latest.osm.pbf
    restart: unless-stopped

# Usage:
# 1. Start: docker-compose up -d
# 2. Wait 5-10 minutes for Bremen data to download and process
# 3. Check status: docker logs valhalla-service
# 4. Test: python test_valhalla.py
